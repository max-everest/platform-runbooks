site_name: Data Services
site_description: Operational runbooks for platform engineering teams
site_author: Data Platform Team
site_url: https://max-everest.github.io/platform-runbooks
use_directory_urls: false

repo_url: https://github.com/max-everest/platform-runbooks
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/images/RSM_Standard_White_Logo.png
  favicon: assets/favicon.png
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - content.feedback

plugins:
  - search
  - awesome-pages
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets

extra_css:
  - ./assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/max-everest/platform-runbooks
  content:
    feedback:
      title: Was this page helpful?
      url: "https://github.com/max-everest/platform-runbooks/issues/new?title=Feedback for: {title}"

nav:
  - Home: index.md
  - Entity Engine: entity-engine/index.md
  - Blog: blog/index.md
  - Data Contracts: data-contracts/index.md
  - Runbooks:
    - Data Platform:
      - Pipeline Failure: runbooks/data-platform/pipeline-failure.md
      - Ingestion Delay: runbooks/data-platform/ingestion-delay.md
    - Fabric:
      - Lakehouse Refresh Failure: runbooks/fabric/lakehouse-refresh-failure.md
    - Integrations:
      - Workday Sync Error: integrations/workday-sync-error.md
  - SOPs: sops/index.md